# YFY runtime paths.
raw_data_dir: /home/user/raw_data/panal
panel_report_dir: /home/user/raw_data/panal/panel_report
analysis_dir: /home/user/analysis

# Default discovered on YFY. Switch to hg38.fa here if the panel BED was built
# against GRCh38.
reference_dir: /home/user/reference
reference_fasta: /home/user/reference/hg19.fa

# Default discovered on YFY panel_report directory.
target_bed: /home/user/raw_data/panal/panel_report/loci.bed

# Sample sheet path relative to repository root.
samples: config/samples.tsv

# Resource defaults.
threads:
  bwa: 8
  samtools: 4
  bamqc: 4

java_mem: 8G
