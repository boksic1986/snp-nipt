# YFY runtime paths.
raw_data_dir: /home/user/raw_data/panal
panel_report_dir: /home/user/raw_data/panal/panel_report
analysis_dir: /home/user/analysis

# The iGeneTech design report is T2574V1hg38, so hg38 is the default.
reference_dir: /home/user/reference
reference_fasta: /home/user/reference/hg38.fa
reference_dict: /home/user/reference/hg38.dict

# SNP capture design files from panel_report.
bait_bed: /home/user/raw_data/panal/panel_report/probeCov.bed
capture_bed: /home/user/raw_data/panal/panel_report/probeCov.predict.bed
loci_bed: /home/user/raw_data/panal/panel_report/loci.bed

# GATK 4 is installed outside conda so it can be reused by later SNP workflows.
gatk: /home/user/software/bin/gatk4

# Sample sheet path relative to repository root.
samples: config/samples.tsv

# Resource defaults.
threads:
  bwa: 16
  samtools: 16
  fastqc: 4
  picard: 32
  bamqc: 16
  depth: 16

resources:
  total_mem_mb: 96000
  picard_mem_mb: 32000
  bamqc_mem_mb: 24000

java_mem: 16G
picard_tmp_dir: /home/user/analysis/tmp/picard
depth_thresholds: 1,10,20,30,50,100
depth_min_base_quality: 20
depth_min_mapping_quality: 20
depth_exclude_flags: 1796
